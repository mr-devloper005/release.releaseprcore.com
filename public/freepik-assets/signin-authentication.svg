<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="form" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Left side illustration -->
  <circle cx="200" cy="300" r="120" fill="#ffffff" opacity="0.1"/>
  <circle cx="150" cy="250" r="80" fill="#ffffff" opacity="0.15"/>
  <circle cx="250" cy="350" r="60" fill="#ffffff" opacity="0.2"/>
  
  <!-- Lock icon -->
  <rect x="170" y="280" width="60" height="45" rx="8" fill="#ffffff" opacity="0.9"/>
  <path d="M 180 280 Q 180 260, 200 260 Q 220 260, 220 280" stroke="#ffffff" stroke-width="4" fill="none" opacity="0.9"/>
  <circle cx="200" cy="302" r="4" fill="#667eea"/>
  
  <!-- Right side form -->
  <rect x="450" y="150" width="300" height="400" rx="20" fill="url(#form)" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Form header -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Welcome Back</text>
  <text x="600" y="225" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">Sign in to your account</text>
  
  <!-- Email field -->
  <rect x="480" y="250" width="240" height="45" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="490" y="278" font-family="Arial, sans-serif" font-size="14" fill="#999">Email address</text>
  
  <!-- Password field -->
  <rect x="480" y="310" width="240" height="45" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="490" y="338" font-family="Arial, sans-serif" font-size="14" fill="#999">Password</text>
  
  <!-- Remember me checkbox -->
  <rect x="480" y="375" width="15" height="15" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="505" y="387" font-family="Arial, sans-serif" font-size="12" fill="#666">Remember me</text>
  
  <!-- Forgot password -->
  <text x="640" y="387" font-family="Arial, sans-serif" font-size="12" fill="#667eea">Forgot password?</text>
  
  <!-- Sign in button -->
  <rect x="480" y="410" width="240" height="45" rx="8" fill="#667eea"/>
  <text x="600" y="438" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">Sign In</text>
  
  <!-- Divider -->
  <line x1="490" y1="480" x2="710" y2="480" stroke="#ddd" stroke-width="1"/>
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#999">Or continue with</text>
  <line x1="490" y1="510" x2="710" y2="510" stroke="#ddd" stroke-width="1"/>
  
  <!-- Social buttons -->
  <rect x="480" y="525" width="75" height="35" rx="8" fill="#ffffff" stroke="#ddd" stroke-width="1"/>
  <rect x="562" y="525" width="75" height="35" rx="8" fill="#ffffff" stroke="#ddd" stroke-width="1"/>
  <rect x="645" y="525" width="75" height="35" rx="8" fill="#ffffff" stroke="#ddd" stroke-width="1"/>
  
  <!-- Social icons (simplified) -->
  <circle cx="517" cy="542" r="8" fill="#4285f4"/>
  <circle cx="600" cy="542" r="8" fill="#1877f2"/>
  <circle cx="682" cy="542" r="8" fill="#000000"/>
</svg>
