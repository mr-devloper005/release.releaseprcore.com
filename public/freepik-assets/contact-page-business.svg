<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Main card -->
  <rect x="150" y="100" width="500" height="400" rx="20" fill="url(#card)" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Contact form elements -->
  <rect x="180" y="140" width="440" height="40" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <rect x="180" y="200" width="440" height="40" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <rect x="180" y="260" width="440" height="80" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  
  <!-- Submit button -->
  <rect x="180" y="360" width="120" height="40" rx="8" fill="#667eea"/>
  
  <!-- Contact info side -->
  <rect x="580" y="140" width="30" height="30" rx="15" fill="#667eea"/>
  <rect x="580" y="200" width="30" height="30" rx="15" fill="#667eea"/>
  <rect x="580" y="260" width="30" height="30" rx="15" fill="#667eea"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="80" r="40" fill="#ffffff" opacity="0.1"/>
  <circle cx="700" cy="520" r="60" fill="#ffffff" opacity="0.1"/>
  
  <!-- Text placeholders -->
  <text x="200" y="165" font-family="Arial, sans-serif" font-size="14" fill="#999">Name</text>
  <text x="200" y="225" font-family="Arial, sans-serif" font-size="14" fill="#999">Email</text>
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="14" fill="#999">Message</text>
  <text x="210" y="385" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Send</text>
</svg>
