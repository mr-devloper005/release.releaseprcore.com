<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  
  <!-- Logo elements - News/Media themed -->
  <rect x="40" y="60" width="120" height="80" rx="12" fill="#ffffff" opacity="0.9"/>
  
  <!-- News lines -->
  <rect x="55" y="75" width="90" height="8" rx="4" fill="#f093fb"/>
  <rect x="55" y="90" width="70" height="6" rx="3" fill="#f5576c" opacity="0.7"/>
  <rect x="55" y="105" width="80" height="6" rx="3" fill="#f5576c" opacity="0.7"/>
  <rect x="55" y="120" width="60" height="6" rx="3" fill="#f5576c" opacity="0.7"/>
  
  <!-- News icon -->
  <circle cx="130" cy="100" r="15" fill="#ffffff" opacity="0.8"/>
  <rect x="125" y="95" width="10" height="10" rx="2" fill="#f093fb"/>
</svg>
