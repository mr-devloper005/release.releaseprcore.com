<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="form" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Left side illustration -->
  <circle cx="200" cy="300" r="100" fill="#ffffff" opacity="0.1"/>
  <rect x="160" y="260" width="80" height="80" rx="40" fill="#ffffff" opacity="0.15"/>
  
  <!-- User icon -->
  <circle cx="200" cy="280" r="20" fill="#ffffff" opacity="0.9"/>
  <path d="M 200 300 Q 180 320, 180 340 L 220 340 Q 220 320, 200 300" fill="#ffffff" opacity="0.9"/>
  
  <!-- Plus icon for new user -->
  <circle cx="250" cy="250" r="15" fill="#4caf50"/>
  <path d="M 250 240 L 250 260 M 240 250 L 260 250" stroke="#ffffff" stroke-width="3" fill="none"/>
  
  <!-- Right side form -->
  <rect x="450" y="100" width="300" height="500" rx="20" fill="url(#form)" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Form header -->
  <text x="600" y="140" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Create Account</text>
  <text x="600" y="165" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">Join our community today</text>
  
  <!-- Name fields -->
  <rect x="480" y="190" width="115" height="40" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="490" y="215" font-family="Arial, sans-serif" font-size="14" fill="#999">First Name</text>
  
  <rect x="605" y="190" width="115" height="40" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="615" y="215" font-family="Arial, sans-serif" font-size="14" fill="#999">Last Name</text>
  
  <!-- Email field -->
  <rect x="480" y="245" width="240" height="40" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="490" y="270" font-family="Arial, sans-serif" font-size="14" fill="#999">Email address</text>
  
  <!-- Password field -->
  <rect x="480" y="300" width="240" height="40" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="490" y="325" font-family="Arial, sans-serif" font-size="14" fill="#999">Password</text>
  
  <!-- Confirm password field -->
  <rect x="480" y="355" width="240" height="40" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="490" y="380" font-family="Arial, sans-serif" font-size="14" fill="#999">Confirm Password</text>
  
  <!-- Terms checkbox -->
  <rect x="480" y="415" width="15" height="15" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="505" y="427" font-family="Arial, sans-serif" font-size="11" fill="#666">I agree to the Terms and Conditions</text>
  
  <!-- Sign up button -->
  <rect x="480" y="445" width="240" height="40" rx="8" fill="#f093fb"/>
  <text x="600" y="470" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">Sign Up</text>
  
  <!-- Already have account -->
  <text x="600" y="515" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Already have an account?</text>
  <text x="600" y="535" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#f093fb">Sign In</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="30" fill="#ffffff" opacity="0.1"/>
  <circle cx="700" cy="500" r="40" fill="#ffffff" opacity="0.1"/>
</svg>
