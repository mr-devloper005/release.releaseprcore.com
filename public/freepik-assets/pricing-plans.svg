  <rect x="340" y="430" width="120" height="35" rx="8" fill="#667eea"/>
  <rect x="570" y="430" width="120" height="35" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  
  <text x="170" y="452" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Get Started</text>
  <text x="400" y="452" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ffffff">Get Started</text>
  <text x="630" y="452" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Contact Sales</text>
