<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="premium" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Pricing cards -->
  <!-- Basic plan -->
  <rect x="80" y="150" width="180" height="350" rx="16" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="80" y="150" width="180" height="60" rx="16" fill="#f8f9fa"/>
  <text x="170" y="185" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Basic</text>
  <text x="170" y="250" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#333">$9</text>
  <text x="170" y="270" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">/month</text>
  
  <!-- Pro plan -->
  <rect x="310" y="120" width="180" height="380" rx="16" fill="#ffffff" stroke="#667eea" stroke-width="2"/>
