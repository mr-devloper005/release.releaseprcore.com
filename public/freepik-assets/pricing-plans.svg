  <circle cx="340" cy="312" r="8" fill="#4caf50"/>
  <circle cx="340" cy="332" r="8" fill="#4caf50"/>
  <circle cx="340" cy="352" r="8" fill="#4caf50"/>
  <circle cx="340" cy="372" r="8" fill="#4caf50"/>
  
  <circle cx="570" cy="302" r="8" fill="#4caf50"/>
