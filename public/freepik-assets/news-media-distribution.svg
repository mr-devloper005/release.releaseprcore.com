<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- News cards -->
  <rect x="50" y="100" width="200" height="250" rx="12" fill="url(#card)" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="300" y="100" width="200" height="250" rx="12" fill="url(#card)" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="550" y="100" width="200" height="250" rx="12" fill="url(#card)" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Card content placeholders -->
  <rect x="60" y="110" width="180" height="100" rx="8" fill="#f5f5f5"/>
  <rect x="310" y="110" width="180" height="100" rx="8" fill="#f5f5f5"/>
  <rect x="560" y="110" width="180" height="100" rx="8" fill="#f5f5f5"/>
  
  <!-- Text lines -->
  <rect x="60" y="220" width="120" height="8" rx="4" fill="#ddd"/>
  <rect x="60" y="235" width="160" height="8" rx="4" fill="#ddd"/>
  <rect x="60" y="250" width="140" height="8" rx="4" fill="#ddd"/>
  
  <rect x="310" y="220" width="120" height="8" rx="4" fill="#ddd"/>
  <rect x="310" y="235" width="160" height="8" rx="4" fill="#ddd"/>
  <rect x="310" y="250" width="140" height="8" rx="4" fill="#ddd"/>
  
  <rect x="560" y="220" width="120" height="8" rx="4" fill="#ddd"/>
  <rect x="560" y="235" width="160" height="8" rx="4" fill="#ddd"/>
  <rect x="560" y="250" width="140" height="8" rx="4" fill="#ddd"/>
  
  <!-- Distribution arrows -->
  <path d="M 250 225 L 290 225" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 500 225 L 540 225" stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <!-- Bottom distribution network -->
  <circle cx="400" cy="450" r="40" fill="#667eea"/>
  <circle cx="200" cy="480" r="25" fill="#f093fb"/>
  <circle cx="400" cy="520" r="25" fill="#f093fb"/>
  <circle cx="600" cy="480" r="25" fill="#f093fb"/>
  
  <!-- Connection lines -->
  <line x1="380" y1="450" x2="220" y2="480" stroke="#667eea" stroke-width="2"/>
  <line x1="400" y1="490" x2="400" y2="495" stroke="#667eea" stroke-width="2"/>
  <line x1="420" y1="450" x2="580" y2="480" stroke="#667eea" stroke-width="2"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="50" r="30" fill="#ffffff" opacity="0.2"/>
  <circle cx="700" cy="550" r="40" fill="#ffffff" opacity="0.2"/>
</svg>
