<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- News card mockup -->
  <rect x="100" y="100" width="600" height="400" rx="16" fill="#ffffff" opacity="0.95"/>
  
  <!-- Image placeholder -->
  <rect x="120" y="120" width="560" height="200" rx="8" fill="#f5f5f5"/>
  
  <!-- Headline lines -->
  <rect x="120" y="340" width="400" height="12" rx="6" fill="#ddd"/>
  <rect x="120" y="365" width="520" height="8" rx="4" fill="#eee"/>
  <rect x="120" y="385" width="480" height="8" rx="4" fill="#eee"/>
  <rect x="120" y="405" width="500" height="8" rx="4" fill="#eee"/>
  
  <!-- Meta info -->
  <rect x="120" y="440" width="80" height="6" rx="3" fill="#bbb"/>
  <rect x="210" y="440" width="100" height="6" rx="3" fill="#bbb"/>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="50" r="30" fill="#ffffff" opacity="0.1"/>
  <circle cx="750" cy="550" r="40" fill="#ffffff" opacity="0.1"/>
  
  <!-- News icon -->
  <rect x="350" y="220" width="100" height="80" rx="8" fill="#667eea" opacity="0.2"/>
  <rect x="370" y="240" width="60" height="40" rx="4" fill="#667eea" opacity="0.4"/>
</svg>
